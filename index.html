<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Botão Misterioso</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin-top:120px;
}

h1{
font-size:55px;
}

p{
font-size:22px;
opacity:0.8;
}

button{
margin-top:40px;
padding:25px 50px;
font-size:28px;
border:none;
border-radius:20px;
background:#00ffcc;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<h1>⚠️ BOTÃO MISTERIOSO ⚠️</h1>

<p>Não aperte esse botão...</p>

<button onclick="tocarSom()">
Apertar botão
</button>

<audio id="som">
<source src="sixseven.mp3" type="audio/mpeg">
</audio>

<script>

function tocarSom(){
document.getElementById("som").play();
}

</script>

</body>
</html>
