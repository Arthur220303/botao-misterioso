<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Botão Misterioso</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin-top:120px;
}

h1{
font-size:60px;
}

p{
font-size:22px;
}

button{
margin-top:40px;
padding:25px 50px;
font-size:28px;
border:none;
border-radius:20px;
background:red;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#mensagem{
margin-top:40px;
font-size:50px;
color:#00ffcc;
display:none;
}
</style>

</head>

<body>

<h1>⚠️ BOTÃO MISTERIOSO ⚠️</h1>
<p>Não aperte esse botão...</p>

<button onclick="ativarSixSeven()">NÃO APERTE</button>

<div id="mensagem">SIX SEVEN</div>

<audio id="som">
<source src="sixseven.mp3" type="audio/mpeg">
</audio>

<script>
function ativarSixSeven(){
document.getElementById("som").play();
document.getElementById("mensagem").style.display = "block";
}
</script>

</body>
</html>
